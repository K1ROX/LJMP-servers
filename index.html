<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LJMP Server List</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #1e1e1e;
        color: #f0f0f0;
        margin: 0;
        padding: 0;
    }
    header {
        background: #282828;
        padding: 20px;
        text-align: center;
        font-size: 1.8em;
        font-weight: bold;
        color: #ff6f61;
    }
    .server-list {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 20px;
        gap: 15px;
    }
    .server {
        background: #333;
        width: 90%;
        max-width: 800px;
        padding: 15px 20px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: transform 0.2s, background 0.2s;
    }
    .server:hover {
        transform: scale(1.02);
        background: #444;
    }
    .server-info {
        display: flex;
        flex-direction: column;
    }
    .server-name {
        font-size: 1.2em;
        font-weight: bold;
        color: #ffcc00;
    }
    .server-ip {
        font-size: 0.9em;
        color: #ccc;
    }
    .players {
        font-weight: bold;
        color: #4caf50;
    }
    footer {
        text-align: center;
        padding: 15px;
        background: #282828;
        color: #888;
        position: fixed;
        bottom: 0;
        width: 100%;
    }
</style>
</head>
<body>
<header>LJMP Server List</header>

<div class="server-list" id="serverList">
    Loading servers...
</div>

<footer>LJMP 2026</footer>

<script>
// --- EASY SERVER CONFIGURATION ---
// Just add IPs here. Format: "http://IP:PORT/server_info"
const SERVERS = [
    "127.0.0.1:7777",
    "192.168.1.50:7777",
    // Add more servers here
];

async function fetchServer(url) {
    try {
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ type: "get_server_info" })
        });
        return await response.json();
    } catch (err) {
        console.error("Failed to fetch", url, err);
        return null;
    }
}

async function loadServers() {
    const serverList = document.getElementById('serverList');
    serverList.innerHTML = "";

    for (const url of SERVERS) {
        const server = await fetchServer(url);

        const div = document.createElement('div');
        div.classList.add('server');

        if (server) {
            div.innerHTML = url;
        } else {
            div.innerHTML = `
                <div class="server-info">
                    <span class="server-name">Server Offline</span>
                    <span class="server-ip">${url}</span>
                </div>
                <span class="players">--/--</span>
            `;
        }

        serverList.appendChild(div);
    }
}

// Auto-refresh every 10 seconds
loadServers();
setInterval(loadServers, 10000);
</script>

</body>
</html>
